<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Ботаника</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #2c3e50; font-size: 22px; text-align: center; margin-bottom: 20px; }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        input { width: 100px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; text-align: center; }
        input:focus { outline: none; border-color: #27ae60; background: #f0fff4; }
        .total-box { background: #27ae60; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 25px; }
        .total-label { font-size: 14px; opacity: 0.9; }
        .total-amount { font-size: 32px; font-weight: bold; }
        .footer { text-align: center; margin-top: 15px; font-size: 12px; color: #95a5a6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🇲🇩 Калькулятор MDL<br><span style="font-size: 14px; color: #7f8c8d;">Специально для тёти Иры</span></h1>
        
        <div class="row"><span>1000 MDL</span><input type="number" id="m1000" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>500 MDL</span><input type="number" id="m500" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>200 MDL</span><input type="number" id="m200" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>100 MDL</span><input type="number" id="m100" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>50 MDL</span><input type="number" id="m50" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>20 MDL</span><input type="number" id="m20" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>10 MDL</span><input type="number" id="m10" placeholder="0" oninput="calc()"></div>
        <div class="row"><span>1 MDL</span><input type="number" id="m1" placeholder="0" oninput="calc()"></div>

        <div class="total-box">
            <div class="total-label">ОБЩАЯ СУММА:</div>
            <div class="total-amount"><span id="result">0</span> L</div>
        </div>
        
        <div class="footer">Made with ❤️ for Aunt Ira by Vitya</div>
    </div>

    <script>
        function calc() {
            const vals = [1000, 500, 200, 100, 50, 20, 10, 1];
            let total = 0;
            vals.forEach(v => {
                const input = document.getElementById('m' + v);
                if (input.value) total += input.value * v;
            });
            document.getElementById('result').innerText = total.toLocaleString('ru-RU');
        }
    </script>
</body>
</html>
